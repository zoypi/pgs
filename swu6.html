            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    const container = document.getElementById('chartContainer');
                    if (container && container.querySelector('canvas') && chartData) drawChart(chartData);
                }, 500);
            });

            // Map
            const map = L.map('world-map', {
                center: [-25, 133],
                zoom: 3,
                minZoom: 2,
                maxZoom: 18,
                zoomControl: true,
                attributionControl: true,
                worldCopyJump: false,
            });

            // Location label overlay — top-centre of the map
            (function() {
                const div = document.createElement('div');
                div.id = 'locationLabel';
                div.style.cssText = 'position:absolute;left:50%;transform:translateX(-50%);top:10px;z-index:800;background:#fff;border-radius:8px;padding:5px 14px;font-size:0.8rem;color:#0f1419;pointer-events:none;text-align:center;white-space:nowrap;max-width:70%;font-family:-apple-system,sans-serif;';
                map.getContainer().appendChild(div);
            })();

            function loadPref(key, def) {
                const v = localStorage.getItem('sw_pref_' + key);
                return v === null ? def : v === 'true';
            }
            function savePref(key, val) { localStorage.setItem('sw_pref_' + key, val); }

            let showEnglish = loadPref('english', false);

            function makeTileLayer(english) {
                if (english) {
                    return L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        attribution: '© OpenStreetMap © CARTO',
                        maxZoom: 19,
                        opacity: 1,
                    });
                } else {
                    return L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors',
                        maxZoom: 18,
                        opacity: 1,
                    });
                }
            }

            let tileLayer = makeTileLayer(showEnglish).addTo(map);

            // Day/night terminator overlay — single blurred polygon via custom pane
            function getSolarParams() {
                const now = new Date();
                const JD = now.getTime() / 86400000 + 2440587.5;
                const n = JD - 2451545.0;
                const L = (280.460 + 0.9856474 * n) % 360;
                const g = ((357.528 + 0.9856003 * n) % 360) * Math.PI / 180;
                const lambda = (L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * Math.PI / 180;
                const eps = (23.439 - 0.0000004 * n) * Math.PI / 180;
                const dec = Math.asin(Math.sin(eps) * Math.sin(lambda));
                const GMST = ((6.697375 + 0.0657098242 * n) % 24 +
                    now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600) % 24;
                const RA = Math.atan2(Math.cos(eps) * Math.sin(lambda), Math.cos(lambda)) * 12 / Math.PI;
                let sunLon = ((RA - GMST) * 15 + 360) % 360;
                if (sunLon > 180) sunLon -= 360;
                return { dec, sunLon };
            }

            function computeNightPolygon() {
                const { dec, sunLon } = getSolarParams();
                const tanDec = Math.tan(dec);
                const pts = [];
                for (let lng = -540; lng <= 540; lng++) {
                    const lngR = (lng - sunLon) * Math.PI / 180;
                    const lat = Math.abs(tanDec) < 0.0001
                        ? (Math.cos(lngR) > 0 ? -90 : 90)
                        : Math.atan(-Math.cos(lngR) / tanDec) * 180 / Math.PI;
                    pts.push([lat, lng]);
                }
                if (dec > 0) { pts.push([-90, 540]); pts.push([-90, -540]); }
                else         { pts.push([ 90, 540]); pts.push([ 90, -540]); }
                return pts;
            }

            // Custom pane so we can apply CSS blur to just this layer
            map.createPane('nightPane');
            map.getPane('nightPane').style.filter = 'blur(14px)';
            map.getPane('nightPane').style.pointerEvents = 'none';

            const btnStyle = 'font:0.65rem/1 -apple-system,sans-serif;padding:2px 7px;background:#f1f5f9;border:1px solid #9ca3af;border-radius:4px;cursor:pointer;color:#374151;display:block;margin-bottom:4px;user-select:none;-webkit-user-select:none;box-shadow:0 1px 4px rgba(0,0,0,0.13);min-width:150px;text-align:left;';

            function stateLabel(label, on) {
                const onStr  = `<span style="color:${on  ? '#111827' : '#9ca3af'}">ON</span>`;
                const offStr = `<span style="color:${on  ? '#6b7280' : '#111827'}">OFF</span>`;
                return `${label} ${onStr} | ${offStr}`;
            }

            // --- Satellite overlay ---
            let showSat = true;

            function buildSatLayer() {
                const d = new Date(Date.now() - 86400000);
                const date = d.toISOString().slice(0, 10);
                return L.tileLayer(
                    `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_NOAA20_CorrectedReflectance_TrueColor/default/${date}/GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg`,
                    { opacity: 0.8, zIndex: 490, maxNativeZoom: 9, attribution: 'NASA GIBS' }
                );
            }
            let satLayer = buildSatLayer();
            if (showSat) satLayer.addTo(map);

            let satPillBtn = null;
            function setSat(on) {
                showSat = on;
                savePref('sat', on);
                if (showSat) { if (!map.hasLayer(satLayer)) satLayer.addTo(map); }
                else { if (map.hasLayer(satLayer)) map.removeLayer(satLayer); }
                if (satPillBtn) satPillBtn._updateStyle();
            }

            // --- Night overlay ---
            let showNight = loadPref('night', false);
            const nightLayer = L.polygon(computeNightPolygon(), {
                pane: 'nightPane',
                color: 'none',
                fillColor: '#0d1b3e',
                fillOpacity: 0.45,
                interactive: false,
                smoothFactor: 2,
            });
            if (showNight) nightLayer.addTo(map);

            setInterval(() => { if (showNight) nightLayer.setLatLngs(computeNightPolygon()); }, 60000);

            // --- Map pill controls (topright) ---


            // Default Locations

            // Satellite VIIRS
            const _satCtrl = makeMapPill('Satellite VIIRS', (btn) => {
                satPillBtn = btn;
                setSat(!showSat);
            }, () => showSat);
            // Capture the sat pill button element for external style updates
            if (_satCtrl.getContainer) satPillBtn = _satCtrl.getContainer();
            // Force sat on at load with button in sync
            setSat(true);

            // Day/Night Overlay
            const _nightCtrl = makeMapPill('Day/Night Overlay', (btn) => {
                showNight = !showNight;
                savePref('night', showNight);
                if (showNight) { nightLayer.setLatLngs(computeNightPolygon()); map.addLayer(nightLayer); }
                else map.removeLayer(nightLayer);
                setSat(false);
                btn.style.cssText = showNight ? mapPillActiveStyle : mapPillStyle;
                btn.textContent = 'Day/Night Overlay';
            }, () => showNight);

            // CartoDB Overlay
            const _engCtrl = makeMapPill('CartoDB Overlay', (btn) => {
                showEnglish = !showEnglish;
                savePref('english', showEnglish);
                map.removeLayer(tileLayer);
                tileLayer = makeTileLayer(showEnglish).addTo(map);
                setSat(false);
                btn.style.cssText = showEnglish ? mapPillActiveStyle : mapPillStyle;
                btn.textContent = 'CartoDB Overlay';
            }, () => showEnglish);

            // Search button
            const _searchCtrl = L.control({ position: 'topright' });
            _searchCtrl.onAdd = function() {
                const wrap = L.DomUtil.create('div', '');
                wrap.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-bottom:0;';

                const btn = L.DomUtil.create('button', '', wrap);
                btn.style.cssText = mapPillStyle;
                btn.textContent = 'Search';

                const inputWrap = L.DomUtil.create('div', '', wrap);
                inputWrap.style.cssText = 'display:none;';
                inputWrap.innerHTML = `<input id="mapSearchInput" type="text" placeholder="Place name…" style="font:0.72rem/1 -apple-system,sans-serif;padding:5px 8px;border:1px solid #8b98a5;border-radius:8px;width:160px;outline:none;color:#0f1419;" />`;

                L.DomEvent.on(btn, 'click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    const showing = inputWrap.style.display !== 'none';
                    inputWrap.style.display = showing ? 'none' : 'block';
                    if (!showing) setTimeout(() => inputWrap.querySelector('input').focus(), 50);
                });

                L.DomEvent.on(inputWrap.querySelector('input'), 'keydown', function(e) {
                    L.DomEvent.stopPropagation(e);
                    if (e.key !== 'Enter') return;
                    const q = e.target.value.trim();
                    if (!q) return;
                    fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`, { headers: { 'Accept-Language': 'en' } })
                        .then(r => r.json())
                        .then(results => {
                            if (!results.length) return;
                            const { lat, lon } = results[0];
                            currentLat = parseFloat(parseFloat(lat).toFixed(5));
                            currentLon = parseFloat(parseFloat(lon).toFixed(5));
                            mapMarker.setLatLng([currentLat, currentLon]);
                            map.setView([currentLat, currentLon], 10);
                            updateLocationLabel(currentLat, currentLon);
                            fetchWeather(currentLat, currentLon, false);
                            showAddLocPopup(currentLat, currentLon);
                            inputWrap.style.display = 'none';
                            e.target.value = '';
                        });
                });

                L.DomEvent.on(inputWrap, 'click', L.DomEvent.stopPropagation);
                return wrap;
            };
            _searchCtrl.addTo(map);

            const pinIcon = L.divIcon({
                className: '',
                html: `<div style="width:24px;height:24px;background:#f0883e;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>`,
                iconSize: [24, 24],
                iconAnchor: [12, 12],
            });

            // Load first location on startup
            const _first = locList[0];
            currentLat = _first.lat; currentLon = _first.lon;
            map.setView([currentLat, currentLon], map.getZoom());
            updateLocationLabel(currentLat, currentLon);
            syncCurrentName();
            fetchWeather(currentLat, currentLon, false);

            mapMarker = L.marker([currentLat, currentLon], { icon: pinIcon }).addTo(map);

            // Map / Graph toggle buttons
            const mapToggleBtn = document.getElementById('mapToggleBtn');
            const mapSection = document.getElementById('map-section');
            let mapVisible = loadPref('mapVisible', true);
            mapSection.style.display = mapVisible ? '' : 'none';
            mapToggleBtn.classList.toggle('active', mapVisible);
            mapToggleBtn.addEventListener('click', () => {
                mapVisible = !mapVisible;
                savePref('mapVisible', mapVisible);
                mapSection.style.display = mapVisible ? '' : 'none';
                mapToggleBtn.classList.toggle('active', mapVisible);
                setSat(false);
                if (mapVisible) setTimeout(() => { map.invalidateSize(); map.setView([currentLat, currentLon], map.getZoom()); }, 50);
            });

            const graphToggleBtn = document.getElementById('graphToggleBtn');
            const graphSection = document.getElementById('graph-section');
            const forecastBtnGroup = document.getElementById('forecastBtnGroup');
            let graphVisible = loadPref('graphVisible', true);
            graphSection.style.display = graphVisible ? '' : 'none';
            if (forecastBtnGroup) forecastBtnGroup.style.display = graphVisible ? '' : 'none';
            graphToggleBtn.classList.toggle('active', graphVisible);
            graphToggleBtn.addEventListener('click', () => {
                graphVisible = !graphVisible;
                savePref('graphVisible', graphVisible);
                graphSection.style.display = graphVisible ? '' : 'none';
                if (forecastBtnGroup) forecastBtnGroup.style.display = graphVisible ? '' : 'none';
                graphToggleBtn.classList.toggle('active', graphVisible);
                if (graphVisible && chartData) drawChart(chartData);
            });

            const dailyToggleBtn = document.getElementById('dailyToggleBtn');
            const dailyStrip = document.getElementById('daily-strip');
            let dailyVisible = true;
            dailyStrip.style.display = dailyVisible ? '' : 'none';
            dailyToggleBtn.classList.toggle('active', dailyVisible);
            dailyToggleBtn.addEventListener('click', () => {
                dailyVisible = !dailyVisible;
                savePref('dailyVisible', dailyVisible);
                dailyStrip.style.display = dailyVisible ? '' : 'none';
                dailyToggleBtn.classList.toggle('active', dailyVisible);
            });

            map.on('click', function(e) {
                const { lat, lng } = e.latlng;
                currentLat = parseFloat(lat.toFixed(5));
                currentLon = parseFloat((((lng % 360) + 540) % 360 - 180).toFixed(5));
                mapMarker.setLatLng([lat, lng]);
                updateLocationLabel(currentLat, currentLon);
                const _nameEl = document.getElementById('currentLocName');
                if (_nameEl) _nameEl.textContent = coordStr(currentLat, currentLon);
                getPlaceName(currentLat, currentLon).then(name => {
                    const el = document.getElementById('currentLocName');
                    if (el) el.textContent = name;
                });
                setSat(false);
                fetchWeather(currentLat, currentLon, false);
                showAddLocPopup(currentLat, currentLon);
            });
        })();
    </script>
</body>
</html>
